<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HTalks Wrapped</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📼</text></svg>">
<style>
:root{--gold:#ffb020;--red:#ff3b5c;--blue:#3b8bff;--ok:#35c46f;--gs:#ff7043;--fb:#ffd54d}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05060b;color:#fff;overflow:hidden;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  -webkit-user-select:none;user-select:none}
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:8vh 7vw;opacity:0;pointer-events:none;
  transition:opacity .6s}
.card.on{opacity:1;pointer-events:auto}
.k{color:var(--gold)}
.eyebrow{font-size:clamp(11px,3vw,15px);letter-spacing:4px;text-transform:uppercase;
  color:#8b96b0;font-weight:700;margin-bottom:3vh;opacity:0;animation:up .7s .2s forwards}
.big{font-size:clamp(56px,22vw,150px);font-weight:900;line-height:.95;
  font-variant-numeric:tabular-nums;opacity:0;animation:pop .8s .5s forwards}
.title{font-size:clamp(24px,7.5vw,44px);font-weight:900;line-height:1.15;
  opacity:0;animation:up .7s .35s forwards}
.sub{font-size:clamp(14px,4.2vw,20px);color:#aab4cc;line-height:1.5;margin-top:3vh;
  max-width:34ch;opacity:0;animation:up .7s 1.1s forwards}
.sub b{color:#fff}
.punch{font-size:clamp(16px,5vw,24px);font-weight:800;color:var(--gold);margin-top:2.5vh;
  opacity:0;animation:up .7s 1.6s forwards}
@keyframes up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
@keyframes pop{0%{opacity:0;transform:scale(.6)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
.bars{display:flex;align-items:flex-end;gap:10px;height:24vh;margin-top:4vh;
  opacity:0;animation:up .7s .9s forwards}
.bar{width:13vw;max-width:64px;background:linear-gradient(180deg,var(--gold),var(--gs));
  border-radius:8px 8px 0 0;position:relative;animation:grow 1s 1.3s both}
.bar span{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);
  font-size:12px;color:#8b96b0;font-weight:700}
.bar b{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:14px}
@keyframes grow{from{height:0!important}}
.vsrow{display:flex;gap:6vw;margin-top:4vh;opacity:0;animation:up .7s 1s forwards}
.vs1{text-align:center}
.vs1 .n{font-size:clamp(40px,13vw,84px);font-weight:900;font-variant-numeric:tabular-nums}
.vs1 .l{font-size:13px;color:#8b96b0;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.progress{position:fixed;top:calc(env(safe-area-inset-top) + 10px);left:12px;right:12px;
  display:flex;gap:4px;z-index:50}
.progress i{flex:1;height:3px;background:#ffffff26;border-radius:2px;overflow:hidden}
.progress i b{display:block;height:100%;width:0;background:var(--gold)}
.progress i.done b{width:100%}
.progress i.act b{animation:fill var(--dur) linear forwards}
@keyframes fill{to{width:100%}}
.hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;
  text-align:center;font-size:11px;color:#5d6780;letter-spacing:2px;z-index:50}
.tapzone{position:fixed;inset:0;z-index:40}
.stamp{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 34px);left:0;right:0;
  text-align:center;font-size:11px;color:#4a5570;letter-spacing:1px}
.doc{margin-top:3.5vh;background:#10141f;border:1px solid #26304a;border-radius:14px;
  padding:16px 20px;font-size:clamp(13px,3.8vw,16px);color:#c7cfe2;max-width:36ch;
  opacity:0;animation:up .7s 1.4s forwards}
.doc b{color:var(--gold)}
.confetti{position:fixed;width:10px;height:10px;z-index:60;pointer-events:none}
</style>
</head>
<body>
<div class="progress" id="prog"></div>
<div class="stage" id="stage"></div>
<div class="hint">dokun ya da → tuşuyla ilerle</div>
<div class="tapzone" id="tap"></div>

<script>
// ================= GERÇEK VERİ — 2.124 video / 1.904 saatlik taramadan =================
const CARDS = [
 {dur:5200, html:`
   <div class="eyebrow">bir yapay zeka</div>
   <div class="title">HTalks'ın<br><span class="k">TAMAMINI</span> izledi.</div>
   <div class="sub">Her canlı yayın. Her video. Her konukluk.<br>Harman dahil. <b>Ocak 2022'den bugüne.</b></div>`},
 {dur:5200, html:`
   <div class="eyebrow">arşivin boyutu</div>
   <div class="big k" data-count="2124">0</div>
   <div class="title">video</div>
   <div class="sub"><b>1.904 saat</b> — kesintisiz izlesen <b>79 gün</b> sürer.<br>O izledi. Ve hiçbirini unutmadı.</div>`},
 {dur:6000, html:`
   <div class="eyebrow">4,5 yılın en çok söylenen kelimesi</div>
   <div class="big" style="font-size:clamp(34px,11vw,84px)">"KATILIYORUM"</div>
   <div class="big k" data-count="3512" style="font-size:clamp(44px,16vw,110px)">0</div>
   <div class="sub">"Katılmıyorum" ise <b>1.615</b> kez.</div>
   <div class="punch">Ama dikkat: her yıl daha itirazcısınız.<br>Onay/itiraz oranı 2.08'den 1.57'ye düştü.</div>`},
 {dur:6000, html:`
   <div class="eyebrow">bir kelimenin yükselişi</div>
   <div class="title">"GARİBAN"</div>
   <div class="bars">
     <div class="bar" style="height:9%"><b>47</b><span>'22</span></div>
     <div class="bar" style="height:19%"><b>99</b><span>'23</span></div>
     <div class="bar" style="height:66%"><b>346</b><span>'24</span></div>
     <div class="bar" style="height:45%"><b>238</b><span>'25</span></div>
     <div class="bar" style="height:48%"><b>250</b><span>'26*</span></div>
   </div>
   <div class="sub" style="margin-top:5vh">Beş sezonda toplam <b>980</b> kez. Viral bir an değil —<br>bir dünya görüşü. <b>*2026 daha yarısında rekor peşinde.</b></div>`},
 {dur:6000, html:`
   <div class="eyebrow">arşiv bir doğum belgesi buldu</div>
   <div class="title">"TEMKİNCAN"<br>doğduğu an kayıtlarda.</div>
   <div class="doc">"Senin en iyi isim <b>Temkincan</b> oldu ya…"<br>— lakabın ilk kez telaffuz edildiği yayın ve dakikası arşivde damgalı. Toplam kullanım: <b>14</b>.</div>
   <div class="punch">Kimse hatırlamıyordu. O hatırlıyor.</div>`},
 {dur:5600, html:`
   <div class="eyebrow">gecelerin rekoru</div>
   <div class="title">En çok <span class="k">"ŞİKE"</span><br>konuşulan gece?</div>
   <div class="doc"><b>Fenerbahçe – Kayserispor</b> maç sonu:<br>tek gecede <b>27 kez</b>. (İkinci: Çarklı Draft, 25)</div>
   <div class="sub">Arşiv toplamı: <b>370</b> — hepsi dakika damgalı.</div>`},
 {dur:5600, html:`
   <div class="eyebrow">imza replik</div>
   <div class="title">"NEDEN YALAN<br>SÖYLÜYORSUN?"</div>
   <div class="vsrow">
     <div class="vs1"><div class="n k" data-count="42">0</div><div class="l">haritalanmış an</div></div>
     <div class="vs1"><div class="n" data-count="17">0</div><div class="l">rekor: tek gecede</div></div>
   </div>
   <div class="sub">Kime, ne zaman, hangi dakikada —<br>hepsi kayıt altında.</div>`},
 {dur:5600, html:`
   <div class="eyebrow">topluluğun kalbi</div>
   <div class="title">12.615 yorum tarandı.<br>En çok konuşulan?</div>
   <div class="vsrow">
     <div class="vs1"><div class="n" style="color:var(--gs)" data-count="680">0</div><div class="l">Hilmi</div></div>
     <div class="vs1"><div class="n" data-count="841">0</div><div class="l">Hasan</div></div>
     <div class="vs1"><div class="n" style="color:var(--fb)" data-count="140">0</div><div class="l">Turancan</div></div>
   </div>
   <div class="punch">Hilmi, ekran süresine oranla<br>açık ara kalplerin şampiyonu.</div>`},
 {dur:5600, html:`
   <div class="eyebrow">ve tabii ki</div>
   <div class="big k" data-count="1182">0</div>
   <div class="title">kez söylendi:</div>
   <div class="sub" style="font-size:clamp(17px,5.4vw,26px);color:#fff;font-weight:800">"Htalks'ın hastaları,<br>delileri, manyakları…"</div>
   <div class="punch">Neredeyse her açılışta. 4,5 yıldır.</div>`},
 {dur:7000, html:`
   <div class="eyebrow">📼</div>
   <div class="title">ARŞİV artık <span class="k">uyanık.</span></div>
   <div class="sub">2.124 video · 10.460 işaretli an · her dakika adresli.<br><br>Sıradaki adım: arşiv yayına çıkıyor —<br><b>ekip kendi hafızasına karşı oynuyor.</b></div>
   <div class="punch">Bu bir fan çalışması. Sayılar gerçek.</div>
   <div class="stamp">kaynak: tam-arşiv transkript taraması · Temmuz 2026</div>`},
];

const stage=document.getElementById('stage'), prog=document.getElementById('prog');
CARDS.forEach((c,i)=>{
  const d=document.createElement('div');d.className='card';d.id='c'+i;d.innerHTML=c.html;stage.appendChild(d);
  const p=document.createElement('i');p.innerHTML='<b></b>';prog.appendChild(p);
});
let cur=-1,timer=null;
function counters(el){
  el.querySelectorAll('[data-count]').forEach(n=>{
    const target=+n.dataset.count,t0=performance.now(),D=1400;
    function step(t){const k=Math.min(1,(t-t0)/D);
      n.textContent=Math.round(target*(1-Math.pow(1-k,3))).toLocaleString('tr-TR');
      if(k<1)requestAnimationFrame(step);}
    setTimeout(()=>requestAnimationFrame(step),500);
  });
}
function go(i){
  if(i>=CARDS.length)i=CARDS.length-1;
  if(i===cur)return;
  clearTimeout(timer);
  [...prog.children].forEach((p,j)=>{p.className=j<i?'done':j===i?'act':'';
    if(j===i)p.style.setProperty('--dur',CARDS[i].dur+'ms');});
  if(cur>=0)document.getElementById('c'+cur).classList.remove('on');
  cur=i;
  const el=document.getElementById('c'+i);
  // animasyonları resetle
  el.querySelectorAll('*').forEach(x=>{x.style.animation='none';x.offsetHeight;x.style.animation='';});
  el.classList.add('on');
  counters(el);
  if(i===CARDS.length-1)konfeti();
  else timer=setTimeout(()=>go(i+1),CARDS[i].dur);
}
document.getElementById('tap').addEventListener('click',e=>{
  const x=e.clientX/innerWidth;
  go(x<0.3?Math.max(0,cur-1):cur+1);
});
// klavye: → / boşluk ileri, ← geri (dokunma/tık davranışı aynen korunur)
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.code==='Space'){e.preventDefault();go(cur+1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();go(Math.max(0,cur-1));}
});
let konfOn=false;
function konfeti(){
  if(konfOn)return;konfOn=true;
  setInterval(()=>{for(let i=0;i<5;i++){
    const k=document.createElement('div');k.className='confetti';
    k.style.background=['#ffb020','#ff3b5c','#3b8bff','#35c46f'][Math.random()*4|0];
    k.style.left=Math.random()*100+'vw';k.style.top='-15px';
    k.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(k);
    k.animate([{top:'-15px'},{top:'105vh'}],{duration:2200+Math.random()*1600,easing:'ease-in'})
     .onfinish=()=>k.remove();
  }},170);
}
go(0);
</script>
</body>
</html>
